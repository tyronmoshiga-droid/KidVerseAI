name: Mirror to GitLab & Codeberg

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        if: ${{ secrets.GITLAB_TOKEN }}
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          git remote add gitlab https://oauth2:$GITLAB_TOKEN@gitlab.com/RookieEnough/Orion-Data.git
          git push gitlab main || echo "Failed to push to GitLab"

      - name: Push to Codeberg
        if: ${{ secrets.CODEBERG_TOKEN }}
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          git remote add codeberg https://$CODEBERG_TOKEN@codeberg.org/RookieEnough/Orion-Data.git
          git push codeberg main || echo "Failed to push to Codeberg"
