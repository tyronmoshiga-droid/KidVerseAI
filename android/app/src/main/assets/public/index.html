      (function() {
        try {
          // Primary: fast localStorage mirror written by setTheme()
          var theme = localStorage.getItem('app-theme');
          var valid = ['light', 'dusk', 'dark', 'oled'];
          if (!theme || !valid.includes(theme)) {
            // Fallback: try the persisted store JSON (written by zustand-persist)
            var stored = localStorage.getItem('orion-settings-storage');
            if (stored) {
              var p = JSON.parse(stored);
              if (p && p.state && p.state.theme) theme = p.state.theme;
            }
          }
          if (!theme || !valid.includes(theme)) theme = 'light';
          document.documentElement.classList.add(theme);
        } catch (e) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
