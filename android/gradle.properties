# ?? JVM / Daemon ???????????????????????????????????????????????????
# Give the Gradle daemon more heap so it doesn't GC during compilation.
org.gradle.jvmargs=-Xmx6144m -Xms1024m -XX:+UseG1GC -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# ?? Android ????????????????????????????????????????????????????????
android.useAndroidX=true
android.enableJetifier=true

# Suppress the warning caused by the Unity Ads plugin using SDK 35
android.suppressUnsupportedCompileSdk=35

# Enable non-transitive R classes ? smaller dex, faster build
android.nonTransitiveRClass=true

# Disable build features we don't use to speed up configuration
android.defaults.buildfeatures.buildconfig=false
android.defaults.buildfeatures.aidl=false
android.defaults.buildfeatures.renderscript=false
android.defaults.buildfeatures.resvalues=false
android.defaults.buildfeatures.shaders=false